{% extends 'base.html' %}
{% block page_title %}My Profile{% endblock %}

{% block content %}
<div style="margin-bottom: 20px;">
    <a href="{% url 'student_dashboard' %}" style="text-decoration: none; display: inline-flex; align-items: center; gap: 5px; color: var(--text-secondary); font-weight: 500;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Dashboard
    </a>
</div>

<div class="glass-panel" style="padding: 24px; max-width: 600px; margin: 0 auto;">
    <div style="text-align: center; margin-bottom: 30px;">
        <div style="width: 100px; height: 100px; background: rgba(52, 152, 219, 0.2); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 15px; border: 2px solid var(--border-color);">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="var(--info)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
            </svg>
        </div>
        <h3 style="margin-bottom: 5px;">{{ profile_user.first_name }} {{ profile_user.last_name }}</h3>
        <p style="color: var(--text-muted);">{{ profile_user.student.student_class }} | Register Number: {{ profile_user.username }}</p>
    </div>

    <!-- Read only form mirroring the layout -->
    <div style="display: grid; gap: 15px;">
        <div>
            <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Register Number (Username)</label>
            <input type="text" value="{{ profile_user.username }}" class="form-control" readonly style="opacity: 0.7; cursor: not-allowed;">
        </div>
        
        <div>
            <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Role</label>
            <input type="text" value="{{ profile_user.get_role_display }}" class="form-control" readonly style="opacity: 0.7; cursor: not-allowed;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">First Name</label>
                <input type="text" value="{{ profile_user.first_name }}" class="form-control" readonly style="opacity: 0.7; cursor: not-allowed;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Last Name</label>
                <input type="text" value="{{ profile_user.last_name }}" class="form-control" readonly style="opacity: 0.7; cursor: not-allowed;">
            </div>
        </div>
        
        <div>
            <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Email Address</label>
            <input type="email" value="{{ profile_user.email }}" class="form-control" readonly style="opacity: 0.7; cursor: not-allowed;">
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
            <div>
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Phone Number</label>
                <input type="text" value="{{ profile_user.phone_number|default:'-' }}" class="form-control" readonly style="opacity: 0.7; cursor: not-allowed;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 5px; font-size: 0.9rem;">Age</label>
                <input type="number" value="{{ profile_user.age|default:'' }}" class="form-control" readonly style="opacity: 0.7; cursor: not-allowed;">
            </div>
        </div>
    </div>
</div>
{% endblock %}
